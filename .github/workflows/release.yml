name: Release
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release'
        required: true
jobs:
  build-artifacts:
    runs-on: ubuntu-latest
    defaults:
        run:
          working-directory: ./comments-toolkit
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - name: Install musl-tools
        run: sudo apt-get install -y musl-tools
      - name: Install target
        run: rustup target add x86_64-unknown-linux-musl
      - name: Build
        run: cargo build --release --target x86_64-unknown-linux-musl
      - name: Package
        run: tar -czf Linux-x86_64.tgz -C target/x86_64-unknown-linux-musl/release/ comments-toolkit
      - name: Store Archive
        uses: actions/upload-artifact@v4
        with:
          name: Linux-x86_64
          path: comments-toolkit/Linux-x86_64.tgz
  create-release:
    needs: [build-artifacts]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "Linux-x86_64/Linux-x86_64.tgz"
          tag: v${{ github.event.inputs.version }}
